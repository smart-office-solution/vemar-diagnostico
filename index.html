<script>
let step = 0;
const steps = document.querySelectorAll(".step");
const progress = document.getElementById("progress");

function next() {
  steps[step].classList.add("hidden");
  step++;
  steps[step].classList.remove("hidden");

  progress.style.width = ((step) / (steps.length - 1)) * 100 + "%";
}
</script>
